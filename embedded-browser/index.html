<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claw - TikTok 登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 40px 32px;
  width: 360px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  text-align: center;
}
.logo { font-size: 48px; margin-bottom: 12px; }
h1 { font-size: 22px; color: #111; margin-bottom: 6px; font-weight: 700; }
.sub { color: #888; font-size: 14px; margin-bottom: 32px; }

.btn {
  display: block;
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
}
.btn-tiktok {
  background: linear-gradient(135deg, #fe2c55 0%, #ff0050 100%);
  color: #fff;
}
.btn-tiktok:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(254,44,85,0.4); }
.btn-tiktok:active { transform: translateY(0); }
.btn-tiktok:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-ozon {
  background: linear-gradient(135deg, #005bff 0%, #0040cc 100%);
  color: #fff;
}
.btn-ozon:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,91,255,0.4); }
.btn-ozon:active { transform: translateY(0); }
.btn-ozon:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

.status {
  margin-top: 16px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
  text-align: left;
  line-height: 1.5;
}
.status.loading { background: #f0f4ff; color: #3366ff; display: block; }
.status.success { background: #f0fff4; color: #22863a; display: block; }
.status.error   { background: #fff5f5; color: #e53e3e; display: block; }

.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.tip {
  margin-top: 20px;
  font-size: 12px;
  color: #bbb;
  line-height: 1.8;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🦶</div>
  <h1>Claw 店铺登录</h1>
  <p class="sub">点击按钮，Chrome 自动打开登录页</p>

  <button class="btn btn-tiktok" id="btnTikTok" onclick="quickLogin('tiktok')">
    📱 登录 TikTok Shop
  </button>

  <button class="btn btn-ozon" id="btnOzon" onclick="quickLogin('ozon')">
    🛒 登录 OZON
  </button>

  <div class="status" id="status"></div>

  <p class="tip">
    登录后关闭 Chrome 窗口<br>
    系统自动保存登录状态，下次无需重复登录
  </p>
</div>

<script>
const LAUNCHER = 'http://localhost:3002';

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = type === 'loading'
    ? '<span class="spinner"></span>' + msg
    : msg;
}

async function quickLogin(platform) {
  const btnId = platform === 'tiktok' ? 'btnTikTok' : 'btnOzon';
  const btn = document.getElementById(btnId);
  const name = platform === 'tiktok' ? 'TikTok Shop' : 'OZON';

  btn.disabled = true;
  btn.textContent = '⏳ 正在启动...';
  showStatus('正在启动 Chrome，请稍候...', 'loading');

  try {
    const resp = await fetch(LAUNCHER + '/api/quick-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ platform })
    });
    const data = await resp.json();

    if (data.success) {
      showStatus('✅ ' + name + ' 登录页已打开！<br>请在弹出的 Chrome 窗口中完成登录。', 'success');
      btn.textContent = '✅ 已打开，等待登录...';
      listenForClose(platform, btn, name);
    } else {
      showStatus('❌ 启动失败：' + data.error, 'error');
      btn.disabled = false;
      btn.textContent = platform === 'tiktok' ? '📱 登录 TikTok Shop' : '🛒 登录 OZON';
    }
  } catch (e) {
    // 启动器未运行，降级到直接打开登录页
    const urls = {
      tiktok: 'https://seller-accounts.tiktok.com/account/login',
      ozon: 'https://seller.ozon.ru/'
    };
    showStatus('⚠️ 本地启动器未运行，尝试直接打开...', 'loading');
    const w = window.open(urls[platform], '_blank', 'width=1280,height=900');
    if (w) {
      showStatus('✅ ' + name + ' 登录页已打开（直接模式）', 'success');
      btn.textContent = '✅ 已打开';
    } else {
      showStatus('❌ 弹窗被拦截。请先运行 启动内置浏览器.bat 再重试。', 'error');
      btn.disabled = false;
      btn.textContent = platform === 'tiktok' ? '📱 登录 TikTok Shop' : '🛒 登录 OZON';
    }
  }
}

// 监听浏览器关闭（session 保存成功）
function listenForClose(platform, btn, name) {
  const ws = new WebSocket('ws://localhost:3002');
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'session_saved' && msg.platform === platform) {
        showStatus('🎉 登录成功！登录状态已保存，下次自动登录。', 'success');
        btn.textContent = '✅ 已登录';
        ws.close();
        // 通知父窗口
        if (window.opener) {
          window.opener.postMessage({ type: 'LOGIN_SUCCESS', platform }, '*');
        }
      }
      if (msg.type === 'browser_closed' && msg.platform === platform) {
        ws.close();
      }
    } catch (err) {}
  };
  ws.onerror = () => {}; // 静默
}

// 接收父窗口消息（从 Claw 前端直接触发）
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'START_LOGIN') {
    quickLogin(e.data.platform || 'tiktok');
  }
});
</script>
</body>
</html>
