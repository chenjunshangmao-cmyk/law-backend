<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw项目AI访问测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
        
        h1 {
            color: #333;
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 18px;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }
        
        .status-card.success {
            border-color: #10b981;
            background: #f0fdf4;
        }
        
        .status-card.warning {
            border-color: #f59e0b;
            background: #fffbeb;
        }
        
        .status-card.error {
            border-color: #ef4444;
            background: #fef2f2;
        }
        
        .status-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .status-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        .status-desc {
            font-size: 14px;
            color: #666;
        }
        
        .info-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
        }
        
        .info-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .url-list {
            list-style: none;
        }
        
        .url-item {
            padding: 12px 15px;
            background: white;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .url-text {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #333;
            word-break: break-all;
        }
        
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
            margin-left: 10px;
        }
        
        .copy-btn:hover {
            opacity: 0.9;
        }
        
        .ai-instructions {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
        }
        
        .ai-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .ai-list {
            list-style: none;
            margin-left: 10px;
        }
        
        .ai-item {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }
        
        .ai-item:before {
            content: "🤖";
            position: absolute;
            left: 0;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            color: #666;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .status-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🦀</div>
            <h1>Claw项目AI访问测试</h1>
            <p class="subtitle">验证局域网内AI设备访问能力</p>
        </div>
        
        <div class="status-grid">
            <div class="status-card success">
                <div class="status-icon">✅</div>
                <div class="status-title">服务器状态</div>
                <div class="status-desc">HTTP服务器运行正常</div>
            </div>
            
            <div class="status-card success">
                <div class="status-icon">🌐</div>
                <div class="status-title">网络连接</div>
                <div class="status-desc">局域网访问已启用</div>
            </div>
            
            <div class="status-card success">
                <div class="status-icon">📁</div>
                <div class="status-title">文件共享</div>
                <div class="status-desc">项目文件夹可访问</div>
            </div>
            
            <div class="status-card success">
                <div class="status-icon">🤖</div>
                <div class="status-title">AI支持</div>
                <div class="status-desc">多AI设备兼容</div>
            </div>
        </div>
        
        <div class="info-box">
            <div class="info-title">🔗 访问地址</div>
            <ul class="url-list" id="urlList">
                <!-- URL列表将通过JavaScript动态生成 -->
            </ul>
        </div>
        
        <div class="ai-instructions">
            <div class="ai-title">🚀 AI设备访问指南</div>
            <ul class="ai-list">
                <li class="ai-item">确保AI设备在同一局域网内</li>
                <li class="ai-item">使用上述HTTP地址访问项目文件</li>
                <li class="ai-item">支持文件浏览、代码查看、资源下载</li>
                <li class="ai-item">可同时多个AI访问，支持并发</li>
                <li class="ai-item">如需API接口，可扩展开发</li>
            </ul>
        </div>
        
        <div class="footer">
            <p>测试时间: <span id="currentTime"></span></p>
            <p>服务器IP: <span id="serverIP">正在获取...</span> | 端口: 8082</p>
            <p>© 2026 Claw跨境智造平台 | AI协作测试页面</p>
        </div>
    </div>
    
    <script>
        // 获取当前时间
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = 
                now.toLocaleString('zh-CN', { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
        }
        
        // 获取服务器IP
        async function getServerIP() {
            try {
                // 尝试获取本机IP
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('serverIP').textContent = data.ip;
                return data.ip;
            } catch (error) {
                // 如果失败，使用window.location.hostname
                const hostname = window.location.hostname;
                document.getElementById('serverIP').textContent = hostname;
                return hostname;
            }
        }
        
        // 生成URL列表
        function generateUrlList(ip) {
            const urls = [
                { name: '项目首页', path: '/' },
                { name: '前端项目', path: '/frontend' },
                { name: '后端API', path: '/backend' },
                { name: '源代码', path: '/src' },
                { name: '数据文件', path: '/data' },
                { name: '部署文件', path: '/deploy-package' },
                { name: '测试页面', path: '/test-ai-access.html' }
            ];
            
            const urlList = document.getElementById('urlList');
            urlList.innerHTML = '';
            
            urls.forEach(url => {
                const fullUrl = `http://${ip}:8082${url.path}`;
                const li = document.createElement('li');
                li.className = 'url-item';
                li.innerHTML = `
                    <div>
                        <strong>${url.name}:</strong>
                        <div class="url-text">${fullUrl}</div>
                    </div>
                    <button class="copy-btn" data-url="${fullUrl}">复制</button>
                `;
                urlList.appendChild(li);
            });
            
            // 添加复制功能
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const url = this.getAttribute('data-url');
                    navigator.clipboard.writeText(url).then(() => {
                        const originalText = this.textContent;
                        this.textContent = '已复制!';
                        setTimeout(() => {
                            this.textContent = originalText;
                        }, 2000);
                    });
                });
            });
        }
        
        // 测试服务器连接
        async function testConnection() {
            try {
                const response = await fetch(window.location.href);
                if (response.ok) {
                    console.log('✅ 服务器连接正常');
                }
            } catch (error) {
                console.error('❌ 服务器连接失败:', error);
            }
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', async () => {
            updateTime();
            setInterval(updateTime, 1000);
            
            const ip = await getServerIP();
            generateUrlList(ip);
            await testConnection();
            
            // 添加访问统计
            console.log('🦀 Claw项目AI访问测试页面已加载');
            console.log('🌐 服务器IP:', ip);
            console.log('📅 测试时间:', new Date().toLocaleString());
        });
    </script>
</body>
</html>
